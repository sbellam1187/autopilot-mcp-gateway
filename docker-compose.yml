  fetch-mcp:
    image: localhost/autopilot-mcp-wrapper:latest
    container_name: fetch-mcp
    ports:
      - "8081:8081"
    environment:
      - MCP_SERVER_TYPE=fetch-mcp
      - MCP_PORT=8081
      - MCP_COMMAND_TYPE=npx
      - MCP_PACKAGE=fetch-mcp
      - DEFAULT_LIMIT=50000
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:8081/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5

  sequential-thinking-mcp:
    image: localhost/autopilot-mcp-wrapper:latest
    container_name: sequential-thinking-mcp
    ports:
      - "8082:8082"
    environment:
      - MCP_SERVER_TYPE=sequential-thinking-mcp
      - MCP_PORT=8082
      - MCP_COMMAND_TYPE=npx
      - MCP_PACKAGE=@modelcontextprotocol/server-sequential-thinking
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:8082/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5

  azure-mcp:
    image: localhost/autopilot-mcp-wrapper:latest
    container_name: azure-mcp
    ports:
      - "8083:8083"
    environment:
      - MCP_SERVER_TYPE=azure-mcp
      - MCP_PORT=8083
      - MCP_COMMAND_TYPE=npx
      - MCP_PACKAGE=@azure/mcp@latest server start
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:8083/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5

  playwright-mcp:
    image: localhost/autopilot-mcp-wrapper:latest
    container_name: playwright-mcp
    ports:
      - "8084:8084"
    env_file:
      - .env
    environment:
      - MCP_SERVER_TYPE=playwright-mcp
      - MCP_PORT=8084
      - MCP_COMMAND_TYPE=npx
      - MCP_PACKAGE=@playwright/mcp@latest
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:8084/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5

  # slack-mcp:
