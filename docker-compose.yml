  nexus:
    container_name: nexus
    image: localhost/autopilot-mcp-gateway:latest
    ports:
      - "8006:8000"
      - "3002:3000"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    depends_on:
      fetch-mcp:
        condition: service_healthy
      sequential-thinking-mcp:
        condition: service_healthy
      azure-mcp:
        condition: service_healthy
      playwright-mcp:
        condition: service_healthy
