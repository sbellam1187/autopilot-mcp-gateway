# Basic server settings
[server]
listen_address = "0.0.0.0:8000"

[server.health]
enabled = true
path = "/health"

#[server.oauth]
#url = "{{ env.PF_JWKS }}"
#expected_issuer = "{{ env.PF_ISSUER }}"
#expected_audience = "{{ env.PF_AUDIENCE }}"

#[server.oauth.protected_resource]
#resource = "http://localhost:3000"
#authorization_servers = ["{{ env.PF_ISSUER }}"]

[llm]
enabled = false

[mcp]
enabled = true
path = "/mcp"
enable_structured_content = true

# Cache configuration for performance
[mcp.downstream_cache]
max_size = 1000
idle_timeout = "10m"

