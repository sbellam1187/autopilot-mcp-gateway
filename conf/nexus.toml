# GITHUB MCP SERVER
[mcp.servers.github]
url = "{{ env.GITHUB_MCP_SERVER_URL }}"
protocol = "streamable-http"
auth.token = "{{ env.GITHUB_TOKEN }}"
tls.verify_certs = true

